project_name: meteorite_contour_first

data_root: data/meteorite
generated_dir: generated_pictures
evaluation_dir: evaluation_results
checkpoint_dir: checkpoints

model: ddpm
image_size: 64
base_channels: 64

batch_size: 32
num_workers: 2
epochs: 1000
train_steps: 50000
checkpoint_every_steps: 5000
lr: 0.0002
optimizer: Adam
grad_clip: 1.0

beta_schedule: linear
timesteps: 1000

augment: none
crop_foreground: true
pretrain: false

sampling_method: ddpm
sampling_steps: 1000

seed: 42
