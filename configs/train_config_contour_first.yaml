project_name: meteorite_contour_first

data_root: data/meteorite
generated_dir: generated_pictures
evaluation_dir: evaluation_results
checkpoint_dir: checkpoints

model: ddpm
image_size: 128
base_channels: 128

batch_size: 32
num_workers: 2
epochs: 1000
train_steps: 100000
checkpoint_every_steps: 5000
lr: 0.0001
optimizer: AdamW
grad_clip: 1.0

beta_schedule: linear
timesteps: 1000

augment: none
crop_foreground: true
pretrain: false
ema: true
ema_decay: 0.9999

sampling_method: ddpm
sampling_steps: 1000

seed: 42
