project_name: meteorite_ddpm_256_from_exp2_50k

data_root: data/meteorite
generated_dir: generated_pictures
evaluation_dir: evaluation_results
checkpoint_dir: checkpoints

model: ddpm
image_size: 256
base_channels: 128

batch_size: 16
num_workers: 8
epochs: 1000
train_steps: 100000
checkpoint_every_steps: 10000
lr: 0.00005
optimizer: AdamW
grad_clip: 1.0

beta_schedule: cosine
timesteps: 1000

augment:
  horizontal_flip: true
  random_rotation: 10
crop_foreground: true
pretrain: false
ema: true
ema_decay: 0.9999
ema_update_every: 5

sampling_method: ddim
sampling_steps: 1000

init_checkpoint: /root/liaomiaoyi/Assignment3/checkpoints/meteorite_contour_first_20260513_202108_seed42/ddpm_ema_step_0070000.pt
resume_optimizer: false

seed: 42