pretrain: false
ema: true
ema_decay: 0.9999
ema_update_every: 5

sampling_method: ddim
sampling_steps: 1000

init_checkpoint: /root/liaomiaoyi/Assignment3/checkpoints/meteorite_ddpm_256_resume_20260515_202203_seed42/ddpm_latest.pt
resume_optimizer: true
resume_training: true

seed: 42