project_name: meteorite_ddpm_256_resume

data_root: data/meteorite
generated_dir: generated_pictures
evaluation_dir: evaluation_results
checkpoint_dir: checkpoints

model: ddpm
image_size: 256
base_channels: 128

batch_size: 16
num_workers: 8
epochs: 1000
train_steps: 220000
checkpoint_every_steps: 10000
lr: 0.00005
optimizer: AdamW
